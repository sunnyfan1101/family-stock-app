name: 每日股價自動更新

on:
  schedule:
    # 🏃‍♂️ 【常態班】每天下午 15:15 (台灣時間) 跑一次，更新每日股價與零星營收
    # 語法：分 時 日 月 星期 (UTC 7點 = 台灣 15點)
    - cron: '15 7 * * 1-5'

    # 🚀 【財報加班班 1】只有每個月的 10號~15號，下午 17:15 額外跑一次
    # 語法解釋：10-15 代表只有每月的 10 到 15 號會觸發
    - cron: '15 9 10-15 * 1-5'

    # 🚀 【財報加班班 2】只有每個月的 10號~15號，晚上 19:15 再額外跑一次
    - cron: '15 11 10-15 * 1-5'

  workflow_dispatch: # 保留手動按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 下載程式碼 (Checkout)
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 解壓縮資料庫 (Decompress .xz)
      run: |
        python -c "import lzma, shutil; shutil.copyfileobj(lzma.open('stock_data.db.xz', 'rb'), open('stock_data.db', 'wb'))" 2>/dev/null || echo "初次執行或無壓縮檔"

    - name: 執行更新與壓縮 (Update & Compress)
      env: 
        PYTHONIOENCODING: utf-8
      run: |
        python fetch_data.py

    - name: 存檔並上傳 (Commit & Push)
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        
        # 加入 .xz 檔
        git add stock_data.db.xz
        
        # 如果沒有變更 (例如補班日股市沒開)，不報錯
        git commit -m "📈 自動更新股價 (5年/LZMA): $(date +'%Y-%m-%d')" || echo "無資料變動"
        git push